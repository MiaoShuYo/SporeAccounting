name: Deploy Finance Service

on:
  push:
    branches: [ Microservices ]
    paths:
      - 'SP.FinanceService/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Úâ¿þ¢▓þÄ»Õóâ'
        required: true
        default: 'Development'
        type: choice
        options:
          - Development
          - Production
      tag:
        description: 'Docker Úò£ÕâÅµáçþ¡¥'
        required: false
        default: 'latest'
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./SP.FinanceService/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/sp-finance-service:${{ github.event.inputs.tag || 'latest' }}

      - name: Set deployment environment
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "ENVIRONMENT=Development" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=${{ github.event.inputs.environment }}" >> $GITHUB_ENV
          fi

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            HOST_IP=$(ip -o route get 1.1.1.1 2>/dev/null | awk '{print $7; exit}')
            if [ -z "$HOST_IP" ]; then HOST_IP=$(hostname -I | awk '{print $1}'); fi
            docker pull ${{ secrets.DOCKER_USERNAME }}/sp-finance-service:${{ github.event.inputs.tag || 'latest' }}
            docker stop sp-finance-service || true
            docker rm sp-finance-service || true
            docker run -d --name sp-finance-service -p 8399:80 \
              -e ASPNETCORE_ENVIRONMENT=${{ env.ENVIRONMENT }} \
              -e HOST_IP=$HOST_IP \
              -e EXPOSE_PORT=8399 \
              ${{ secrets.DOCKER_USERNAME }}/sp-finance-service:${{ github.event.inputs.tag || 'latest' }}